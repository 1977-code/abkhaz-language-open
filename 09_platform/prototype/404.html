<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#0b1f15">
    <title>4Ҩ4 — страница исчезла · Абхазский язык</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23123524'/%3E%3Ctext x='32' y='45' font-family='Georgia,serif' font-size='34' fill='%23ffffff' text-anchor='middle'%3E%D0%90%D2%A7%3C/text%3E%3C/svg%3E">
    <style>
      :root {
        --night: #0b1f15;
        --forest-dark: #123524;
        --mint: #9fdcb5;
        --white: #ffffff;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--white);
        background: linear-gradient(180deg, #071710 0%, var(--night) 46%, var(--forest-dark) 100%);
        overflow-x: hidden;
      }

      .sky {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      .star {
        position: absolute;
        width: 2px;
        height: 2px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.65);
        animation: twinkle 4s ease-in-out infinite;
      }

      @keyframes twinkle {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.85; }
      }

      .scene {
        position: relative;
        z-index: 1;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 56px 22px 0;
      }

      .code {
        margin: 0;
        font-size: clamp(110px, 24vw, 210px);
        font-weight: 760;
        line-height: 0.95;
        letter-spacing: 0.02em;
        color: var(--white);
        text-wrap: balance;
      }

      .code .glyph {
        color: var(--mint);
        display: inline-block;
        animation: breathe 5s ease-in-out infinite;
      }

      @keyframes breathe {
        0%, 100% { transform: translateY(0); opacity: 1; }
        50% { transform: translateY(-7px); opacity: 0.72; }
      }

      .glyph-note {
        margin: 14px 0 0;
        font-size: 13.5px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55);
      }

      .glyph-note b { color: var(--mint); font-weight: 700; }

      h1 {
        margin: 30px 0 12px;
        font-size: clamp(24px, 4.4vw, 34px);
        line-height: 1.18;
        font-weight: 720;
        text-wrap: balance;
      }

      .lead {
        margin: 0 auto;
        max-width: 540px;
        color: rgba(255, 255, 255, 0.74);
        font-size: 16.5px;
        line-height: 1.65;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        margin: 32px 0 12px;
      }

      .button {
        min-height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 22px;
        border: 1px solid transparent;
        border-radius: 6px;
        font-size: 15px;
        font-weight: 720;
        text-decoration: none;
        transition: transform 160ms ease;
      }

      .button:hover { transform: translateY(-1px); }

      .button-primary { background: var(--white); color: var(--forest-dark); }

      .button-ghost {
        border-color: rgba(255, 255, 255, 0.45);
        color: var(--white);
        background: rgba(255, 255, 255, 0.04);
      }

      .mountains {
        position: relative;
        z-index: 1;
        width: 100%;
        margin-top: auto;
        display: block;
      }

      .mountains svg {
        display: block;
        width: 100%;
        height: clamp(140px, 26vw, 260px);
      }

      .mist {
        position: relative;
        z-index: 2;
        margin-top: -1px;
        background: var(--forest-dark);
        padding: 0 22px 26px;
        text-align: center;
        color: rgba(255, 255, 255, 0.45);
        font-size: 13px;
      }

      .mist a { color: rgba(255, 255, 255, 0.7); text-underline-offset: 4px; }

      @media (prefers-reduced-motion: reduce) {
        .star, .code .glyph { animation: none !important; }
        .button { transition: none; }
      }
    </style>
  </head>
  <body>
    <div class="sky" aria-hidden="true">
      <span class="star" style="left: 8%;  top: 12%; animation-delay: 0s"></span>
      <span class="star" style="left: 22%; top: 28%; animation-delay: 1.2s"></span>
      <span class="star" style="left: 37%; top: 9%;  animation-delay: 2.1s"></span>
      <span class="star" style="left: 52%; top: 21%; animation-delay: 0.6s"></span>
      <span class="star" style="left: 64%; top: 7%;  animation-delay: 2.8s"></span>
      <span class="star" style="left: 78%; top: 18%; animation-delay: 1.7s"></span>
      <span class="star" style="left: 91%; top: 30%; animation-delay: 0.3s"></span>
      <span class="star" style="left: 45%; top: 38%; animation-delay: 3.4s"></span>
      <span class="star" style="left: 14%; top: 44%; animation-delay: 2.5s"></span>
      <span class="star" style="left: 85%; top: 46%; animation-delay: 1s"></span>
    </div>

    <main class="scene">
      <p class="code" aria-label="Ошибка 404">4<span class="glyph">Ҩ</span>4</p>
      <p class="glyph-note"><b>Ҩ</b> — настоящая буква абхазского алфавита</p>
      <h1>Эта страница исчезла</h1>
      <p class="lead">Так пропадают не только страницы. Языки тоже исчезают, когда на них перестают говорить. Страницу мы не спасли — абхазский ещё можем.</p>
      <div class="actions">
        <a class="button button-primary" href="/">Вернуться на главную</a>
        <a class="button button-ghost" href="/#participate">Помочь проекту</a>
      </div>
    </main>

    <div class="mountains" aria-hidden="true">
      <svg viewBox="0 0 1440 260" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 260 L0 190 L140 120 L260 175 L390 80 L520 165 L640 110 L760 180 L900 60 L1040 160 L1170 105 L1300 170 L1440 130 L1440 260 Z" fill="#0e2a1c" opacity="0.85"/>
        <path d="M0 260 L0 225 L120 170 L250 215 L380 150 L540 210 L680 160 L820 220 L980 140 L1120 205 L1260 165 L1380 210 L1440 195 L1440 260 Z" fill="#123524"/>
      </svg>
    </div>

    <div class="mist">
      Открытый проект «Абхазский язык» · <a href="/#documents">документы проекта</a>
    </div>
  </body>
</html>
